<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Profile Page — Git It Together</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>👥 Meet the Team</h1>
    <p>Git It Together Workshop — Team Profile Page</p>
  </header>

  <main>
    <h2>Our Members</h2>

    <div class="team-grid" id="team-grid">

      <!-- =====================================================
           TEAM MEMBERS GO HERE
           Each member adds a card below using this format:

           <div class="member-card">
             ... (copy from members/example.html)
           </div>

           OR you can use an iframe pointing to their file:

           <iframe src="members/yourname.html"
                   style="border:none; width:100%; height:360px; border-radius:16px;">
           </iframe>

           Add your card/iframe below this comment block.
           ===================================================== -->

      <!-- EXAMPLE (remove this once real members are added) -->
      <div class="member-card" style="border: 2px dashed #7c3aed; opacity: 0.5;">
        <div class="member-avatar">🙋</div>
        <div class="member-name">Your Name Here</div>
        <div class="member-role">Your Role</div>
        <div class="member-bio">Copy <code>members/example.html</code>, fill it in, then add your card here!</div>
        <div class="fun-fact"><span>Fun fact:</span> ???</div>
        <div class="fav-emoji">❓</div>
      </div>

    </div>
  </main>

  <footer>
    <p>Built collaboratively during the <strong>Git It Good Innit</strong> workshop 🚀</p>
  </footer>

</body>
</html>
